<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="Mobile-first repair cost estimator for distressed-home walkthroughs." />

  <!-- PWA manifest -->
  <link rel="manifest" href="./manifest.webmanifest" />

  <!-- iOS PWA meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spark Est" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon-180.png" />

  <!-- Favicon -->
  <link rel="icon" href="./assets/favicon.ico" sizes="any" />
  <link rel="icon" href="./assets/icon-192.png" type="image/png" />

  <title>Spark Estimator</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <!-- App mount point -->
  <div id="app">
    <div class="loading-state">
      <div class="loading-logo">
        <img src="./assets/logo.png" alt="Spark Group" class="loading-logo-img" />
      </div>
      <p class="loading-text">Loading Spark Estimator…</p>
    </div>
  </div>

  <!-- Modal root (rendered by components.js) -->
  <div id="modal-root" aria-live="polite"></div>

  <!-- Bottom-sheet root (rendered by components.js) -->
  <div id="sheet-root"></div>

  <!-- Toast root (rendered by components.js) -->
  <div id="toast-root" aria-live="assertive" aria-atomic="true"></div>

  <!-- Entry module -->
  <script type="module" src="./app.js"></script>
</body>
</html>
